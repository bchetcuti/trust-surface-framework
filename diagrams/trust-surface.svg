<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-label="TrustSurface Framework diagram">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;display=swap');
      .bg{fill:#ffffff}
      .panel{fill:#f8fafc;stroke:#e2e8f0;stroke-width:2}
      .card{fill:#ffffff;stroke:#e2e8f0;stroke-width:2}
      .pill{fill:#ffffff;stroke:#d7e2ee;stroke-width:1.6}
      .accent{fill:#0b4f8a}
      .accent-soft{fill:rgba(11,79,138,.08)}
      .line{stroke:#0b4f8a;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .title,.sub,.h,.t,.mono{font-family:'Poppins',system-ui,-apple-system,'Segoe UI',Arial,sans-serif}
      .title{font-size:34px;font-weight:700;fill:#0b4f8a}
      .sub{font-size:15px;font-weight:500;fill:#475569}
      .h{font-size:17px;font-weight:700;fill:#0f172a}
      .t{font-size:13px;font-weight:500;fill:#334155}
      .mono{font-size:12px;font-weight:500;fill:#64748b}
      .strong{font-weight:700;fill:#0f172a}
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#0b4f8a"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="720"/>

  <text x="64" y="78" class="title">TrustSurface Framework</text>
  <text x="64" y="106" class="sub">Trust surface domains → trust signals → trust posture</text>
  <text x="64" y="128" class="sub">A minimal, evidence-led model for governing the digital edge.</text>

  <rect x="52" y="154" width="1096" height="420" rx="24" class="panel"/>

  <rect x="82" y="186" width="462" height="324" rx="18" class="card"/>
  <text x="112" y="222" class="h">Trust surface domains</text>
  <text x="112" y="244" class="t">Stable boundary model for governance, delivery, and assurance.</text>

  <g>
    <rect x="112" y="268" width="402" height="36" rx="18" class="pill"/>
    <text x="130" y="291" class="t"><tspan class="strong">Identity boundary</tspan><tspan> — who or what is interacting</tspan></text>

    <rect x="112" y="314" width="402" height="36" rx="18" class="pill"/>
    <text x="130" y="337" class="t"><tspan class="strong">Domains &amp; DNS</tspan><tspan> — ownership, routing, delegation</tspan></text>

    <rect x="112" y="360" width="402" height="36" rx="18" class="pill"/>
    <text x="130" y="383" class="t"><tspan class="strong">Email integrity</tspan><tspan> — message authenticity and alignment</tspan></text>

    <rect x="112" y="406" width="402" height="36" rx="18" class="pill"/>
    <text x="130" y="429" class="t"><tspan class="strong">Digital services</tspan><tspan> — sites, portals, APIs, status</tspan></text>

    <rect x="112" y="452" width="402" height="36" rx="18" class="pill"/>
    <text x="130" y="475" class="t"><tspan class="strong">Infrastructure &amp; platforms</tspan><tspan> — hosting edge and control plane</tspan></text>
  </g>

  <rect x="588" y="186" width="530" height="324" rx="18" class="card"/>
  <text x="618" y="222" class="h">Trust signals</text>
  <text x="618" y="244" class="t">Observable evidence that describes posture at the surface.</text>

  <g>
    <circle cx="626" cy="276" r="4" class="accent"/>
    <text x="642" y="281" class="t">Authentication and alignment (for example SPF, DKIM, DMARC)</text>

    <circle cx="626" cy="308" r="4" class="accent"/>
    <text x="642" y="313" class="t">Routing and integrity (DNS hygiene, DNSSEC, CAA)</text>

    <circle cx="626" cy="340" r="4" class="accent"/>
    <text x="642" y="345" class="t">Transport security (TLS posture, certificate automation)</text>

    <circle cx="626" cy="372" r="4" class="accent"/>
    <text x="642" y="377" class="t">Reliability and transparency (status, incident communications)</text>

    <circle cx="626" cy="404" r="4" class="accent"/>
    <text x="642" y="409" class="t">Delegated trust evidence (vendor inventory, assurance traceability)</text>

    <circle cx="626" cy="436" r="4" class="accent"/>
    <text x="642" y="441" class="t">Governance artefacts (ownership, cadence, change control)</text>
  </g>

  <rect x="618" y="458" width="470" height="34" rx="12" class="accent-soft"/>
  <text x="634" y="480" class="t"><tspan class="strong">Trust posture:</tspan><tspan> evidence-based state implied by the quality and coverage of signals</tspan></text>

  <path d="M544 350h44" class="line" marker-end="url(#arrowhead)"/>

  <text x="64" y="616" class="h">Operating rhythm</text>
  <text x="64" y="638" class="t">Run trust as a recurring cycle that produces evidence, work, and governance controls.</text>

  <rect x="320" y="594" width="828" height="72" rx="18" class="card"/>
  <text x="350" y="637" class="t"><tspan class="strong">Discover</tspan></text>
  <path d="M424 632h54" class="line" marker-end="url(#arrowhead)"/>
  <text x="502" y="637" class="t"><tspan class="strong">Assess</tspan></text>
  <path d="M564 632h54" class="line" marker-end="url(#arrowhead)"/>
  <text x="642" y="637" class="t"><tspan class="strong">Harden</tspan></text>
  <path d="M710 632h54" class="line" marker-end="url(#arrowhead)"/>
  <text x="790" y="637" class="t"><tspan class="strong">Govern</tspan></text>
  <path d="M860 632h54" class="line" marker-end="url(#arrowhead)"/>
  <text x="940" y="637" class="t"><tspan class="strong">Signal</tspan></text>
  <path d="M997 632h94" class="line" marker-end="url(#arrowhead)"/>

  <text x="350" y="656" class="mono">Inventory → scorecard → hardening plan → controls → verifiable posture</text>
  <text x="64" y="692" class="mono">TSF diagram • CC BY 4.0 • © 2026 Bryan Chetcuti</text>
</svg>
