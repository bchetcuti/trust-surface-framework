<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #111; }
    .box { fill: #fff; stroke: #111; stroke-width: 2; rx: 10; ry: 10; }
    .line { stroke: #111; stroke-width: 2; fill: none; }
    .title { font-size: 22px; font-weight: 700; }
    .small { font-size: 16px; }
  </style>

  <text x="40" y="50" class="title">Trust Surface Framework (TSF)</text>
  <text x="40" y="78" class="small">Digital systems emit trust signals that shape stakeholder trust</text>

  <rect x="470" y="260" width="260" height="80" class="box"/>
  <text x="600" y="308" text-anchor="middle">Organisation</text>

  <rect x="120" y="160" width="240" height="60" class="box"/><text x="240" y="198" text-anchor="middle">Identity</text>
  <rect x="840" y="160" width="240" height="60" class="box"/><text x="960" y="198" text-anchor="middle">Domains &amp; DNS</text>

  <rect x="120" y="260" width="240" height="60" class="box"/><text x="240" y="298" text-anchor="middle">Email Integrity</text>
  <rect x="840" y="260" width="240" height="60" class="box"/><text x="960" y="298" text-anchor="middle">Digital Services</text>

  <rect x="120" y="360" width="240" height="60" class="box"/><text x="240" y="398" text-anchor="middle">Infrastructure &amp; Platforms</text>
  <rect x="840" y="360" width="240" height="60" class="box"/><text x="960" y="398" text-anchor="middle">Third-Party Ecosystem</text>

  <rect x="470" y="420" width="260" height="70" class="box"/>
  <text x="600" y="462" text-anchor="middle">Trust Signals</text>

  <rect x="470" y="540" width="260" height="70" class="box"/>
  <text x="600" y="582" text-anchor="middle">Stakeholder Trust</text>

  <line x1="470" y1="300" x2="360" y2="190" class="line"/>
  <line x1="730" y1="300" x2="840" y2="190" class="line"/>

  <line x1="470" y1="300" x2="360" y2="290" class="line"/>
  <line x1="730" y1="300" x2="840" y2="290" class="line"/>

  <line x1="470" y1="300" x2="360" y2="390" class="line"/>
  <line x1="730" y1="300" x2="840" y2="390" class="line"/>

  <line x1="240" y1="220" x2="470" y2="455" class="line"/>
  <line x1="960" y1="220" x2="730" y2="455" class="line"/>
  <line x1="240" y1="320" x2="470" y2="455" class="line"/>
  <line x1="960" y1="320" x2="730" y2="455" class="line"/>
  <line x1="240" y1="420" x2="470" y2="455" class="line"/>
  <line x1="960" y1="420" x2="730" y2="455" class="line"/>

  <line x1="600" y1="490" x2="600" y2="540" class="line"/>
</svg>
