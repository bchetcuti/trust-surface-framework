<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TSF-02 — Trust Signal Gap</title>
  <desc id="desc">TrustSurface Framework diagram showing the gap between internal assurance and external trust signals.</desc>

  <defs>
    <style>
      text { font-family: Poppins, Arial, sans-serif; fill: #0f172a; }
      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }
      .rule { stroke: #d9e2ec; stroke-width: 2; }
      .footer-rule { stroke: #d9e2ec; stroke-width: 1.5; }

      .panel { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }
      .panel-soft { fill: #f8fbfd; stroke: #d9e2ec; stroke-width: 1.5; }
      .gap { fill: #eef6fb; stroke: #0b4f8a; stroke-width: 2.5; }
      .pill { fill: #ffffff; stroke: #bfd4e5; stroke-width: 1.5; }
      .site-pill { fill: #f8fbfd; stroke: #d9e2ec; stroke-width: 1.5; }
      .footer-box { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }

      .kicker {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .figure-id {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .site-link {
        font-size: 15px;
        font-weight: 600;
        fill: #0b4f8a;
      }

      .status-text {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .title {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .subtitle {
        font-size: 24px;
        font-weight: 500;
        fill: #475569;
      }

      .section-label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .panel-title {
        font-size: 28px;
        font-weight: 650;
      }

      .panel-copy {
        font-size: 17px;
        font-weight: 500;
        fill: #475569;
      }

      .node-title {
        font-size: 18px;
        font-weight: 600;
      }

      .gap-label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .gap-title {
        font-size: 30px;
        font-weight: 700;
      }

      .gap-copy {
        font-size: 18px;
        font-weight: 500;
        fill: #334155;
      }

      .gap-copy-small {
        font-size: 16px;
        font-weight: 500;
        fill: #475569;
      }

      .emphasis-box {
        fill: #ffffff;
        stroke: #bcd0df;
        stroke-width: 1.5;
      }

      .emphasis-text {
        font-size: 15px;
        font-weight: 650;
        fill: #0b4f8a;
      }

      .emphasis-symbol {
        font-size: 24px;
        font-weight: 700;
        fill: #2563EB;
      }

      .footer-copy {
        font-size: 16px;
        font-weight: 600;
      }

      .footer-meta {
        font-size: 14px;
        font-weight: 600;
        fill: #64748b;
      }

      .bullet {
        fill: #0b4f8a;
      }
    </style>

    <symbol id="ts-mark" viewBox="0 0 24 24">
      <path d="M12 3l8 4v6c0 5-3.4 9-8 8-4.6 1-8-3-8-8V7l8-4z" stroke="currentColor" stroke-width="1.8"/>
      <path d="M7.5 10.5h9M7.5 13.5h9M9.5 16.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1600" height="900" class="bg"/>
  <rect x="52" y="52" width="1496" height="796" rx="28" class="frame"/>

  <g transform="translate(110 96)">
    <use href="#ts-mark" x="0" y="0" width="40" height="40" style="color:#0b4f8a"/>
    <text x="58" y="17" class="kicker">TRUSTSURFACE FRAMEWORK</text>
    <text x="0" y="74" class="figure-id">FIGURE TSF-02</text>
    <text x="0" y="132" class="title">Trust Signal Gap</text>
    <text x="0" y="172" class="subtitle">When internal assurance is stronger than the trust signals others can observe.</text>
  </g>

  <g transform="translate(1188 94)">
    <rect x="0" y="0" width="114" height="36" rx="18" class="pill"/>
    <text x="57" y="23" text-anchor="middle" class="status-text">Draft</text>
  </g>

  <g transform="translate(1318 94)">
    <rect x="0" y="0" width="132" height="36" rx="18" class="site-pill"/>
    <text x="66" y="23" text-anchor="middle" class="site-link">trustsurface.org</text>
  </g>

  <line x1="110" y1="258" x2="1490" y2="258" class="rule"/>

  <g transform="translate(110 310)">
    <rect x="0" y="0" width="430" height="420" rx="24" class="panel"/>
    <text x="32" y="42" class="section-label">Inside the organisation</text>
    <text x="32" y="78" class="panel-title">Internal assurance</text>
    <text x="32" y="106" class="panel-copy">Controls, governance and operating practice that may be strong, real and well managed.</text>

    <g transform="translate(32 136)">
      <rect x="0" y="0" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="24" r="4" class="bullet"/>
      <text x="38" y="30" class="node-title">Security controls</text>

      <rect x="0" y="62" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="86" r="4" class="bullet"/>
      <text x="38" y="92" class="node-title">Governance frameworks</text>

      <rect x="0" y="124" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="148" r="4" class="bullet"/>
      <text x="38" y="154" class="node-title">Compliance activity</text>

      <rect x="0" y="186" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="210" r="4" class="bullet"/>
      <text x="38" y="216" class="node-title">Operational resilience</text>

      <rect x="0" y="248" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="272" r="4" class="bullet"/>
      <text x="38" y="278" class="node-title">Infrastructure confidence</text>
    </g>
  </g>

  <g transform="translate(600 310)">
    <rect x="0" y="0" width="400" height="420" rx="28" class="gap"/>
    <text x="200" y="42" text-anchor="middle" class="gap-label">Core concept</text>
    <text x="200" y="84" text-anchor="middle" class="gap-title">Trust Signal Gap</text>

    <text x="200" y="146" text-anchor="middle" class="gap-copy">
      <tspan x="200" dy="0">A gap emerges when internal</tspan>
      <tspan x="200" dy="28">assurance is not matched by</tspan>
      <tspan x="200" dy="28">clear, consistent external</tspan>
      <tspan x="200" dy="28">trust signals.</tspan>
    </text>

    <rect x="76" y="246" width="248" height="42" rx="12" class="emphasis-box"/>
    <text x="182" y="272" text-anchor="end" class="emphasis-text">Security posture</text>
    <text x="200" y="272" text-anchor="middle" class="emphasis-symbol">≠</text>
    <text x="218" y="272" text-anchor="start" class="emphasis-text">Trust posture</text>

    <text x="200" y="332" text-anchor="middle" class="gap-copy-small">
      <tspan x="200" dy="0">Trust must be made observable</tspan>
      <tspan x="200" dy="24">before it can be assessed, relied on,</tspan>
      <tspan x="200" dy="24">or believed by others.</tspan>
    </text>
  </g>

  <g transform="translate(1060 310)">
    <rect x="0" y="0" width="430" height="420" rx="24" class="panel"/>
    <text x="32" y="42" class="section-label">Outside the organisation</text>
    <text x="32" y="78" class="panel-title">External trust signals</text>
    <text x="32" y="106" class="panel-copy">Evidence that customers, partners, regulators and the public can actually observe.</text>

    <g transform="translate(32 136)">
      <rect x="0" y="0" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="24" r="4" class="bullet"/>
      <text x="38" y="30" class="node-title">Email authenticity</text>

      <rect x="0" y="62" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="86" r="4" class="bullet"/>
      <text x="38" y="92" class="node-title">Domain integrity</text>

      <rect x="0" y="124" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="148" r="4" class="bullet"/>
      <text x="38" y="154" class="node-title">Website trust</text>

      <rect x="0" y="186" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="210" r="4" class="bullet"/>
      <text x="38" y="216" class="node-title">Service reliability</text>

      <rect x="0" y="248" width="366" height="48" rx="14" class="panel-soft"/>
      <circle cx="20" cy="272" r="4" class="bullet"/>
      <text x="38" y="278" class="node-title">Third-party confidence</text>
    </g>
  </g>

  <g transform="translate(110 778)">
    <line x1="0" y1="0" x2="1380" y2="0" class="footer-rule"/>
    <text x="0" y="28" class="footer-meta">Figure TSF-02 · TrustSurface Framework · v0.2</text>
    <text x="1380" y="28" text-anchor="end" class="footer-copy">The Trust Surface is where internal assurance becomes visible, legible and credible to others.</text>
  </g>
</svg>