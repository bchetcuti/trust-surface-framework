<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TSF-07 — Digital Trust Maturity Model</title>
  <desc id="desc">TrustSurface Framework maturity model showing progression from Unaware to Trust Leader across digital trust governance capability.</desc>

  <defs>
    <style>
      text { font-family: Poppins, Arial, sans-serif; fill: #0f172a; }

      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }
      .rule { stroke: #d9e2ec; stroke-width: 2; }
      .footer-rule { stroke: #d9e2ec; stroke-width: 1.5; }

      .pill { fill: #ffffff; stroke: #bfd4e5; stroke-width: 1.5; }
      .site-pill { fill: #f8fbfd; stroke: #d9e2ec; stroke-width: 1.5; }

      .panel { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.5; }
      .panel-soft { fill: #f8fbfd; stroke: #d9e2ec; stroke-width: 1.5; }
      .panel-accent { fill: #eef6fb; stroke: #0b4f8a; stroke-width: 2.25; }

      .step-1 { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.5; }
      .step-2 { fill: #f8fbfd; stroke: #cbd5e1; stroke-width: 1.5; }
      .step-3 { fill: #f4f8fb; stroke: #bfd4e5; stroke-width: 1.5; }
      .step-4 { fill: #eef6fb; stroke: #9dc0d9; stroke-width: 1.75; }
      .step-5 { fill: #e8f2f9; stroke: #0b4f8a; stroke-width: 2.25; }

      .line-soft { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
      .logo-mark { color: #0b4f8a; }
      .bullet { fill: #0b4f8a; }

      .kicker {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .figure-id {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .title-text {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .subtitle-text {
        font-size: 24px;
        font-weight: 500;
        fill: #475569;
      }

      .status-text {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .site-link {
        font-size: 15px;
        font-weight: 600;
        fill: #0b4f8a;
      }

      .section-label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .section-label-accent {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .panel-title {
        font-size: 26px;
        font-weight: 700;
      }

      .panel-copy {
        font-size: 17px;
        font-weight: 500;
        fill: #475569;
      }

      .step-num {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .step-title {
        font-size: 24px;
        font-weight: 700;
      }

      .step-copy {
        font-size: 15px;
        font-weight: 500;
        fill: #475569;
      }

      .maturity-axis {
        font-size: 15px;
        font-weight: 600;
        fill: #64748b;
      }

      .footer-meta {
        font-size: 14px;
        font-weight: 600;
        fill: #64748b;
      }

      .footer-statement {
        font-size: 16px;
        font-weight: 600;
      }
    </style>

    <symbol id="ts-mark" viewBox="0 0 24 24">
      <path d="M12 3l8 4v6c0 5-3.4 9-8 8-4.6 1-8-3-8-8V7l8-4z" stroke="currentColor" stroke-width="1.8"/>
      <path d="M7.5 10.5h9M7.5 13.5h9M9.5 16.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1600" height="900" class="bg"/>
  <rect x="52" y="52" width="1496" height="796" rx="28" class="frame"/>

  <!-- Header -->
  <g transform="translate(110 96)">
    <use href="#ts-mark" x="0" y="0" width="40" height="40" class="logo-mark"/>
    <text x="58" y="17" class="kicker">TRUSTSURFACE FRAMEWORK</text>
    <text x="0" y="74" class="figure-id">FIGURE TSF-07</text>
    <text x="0" y="132" class="title-text">Digital Trust Maturity Model</text>
    <text x="0" y="172" class="subtitle-text">A progression model for how organisations move from fragmented trust management to deliberate trust leadership.</text>
  </g>

  <!-- Top-right chrome -->
  <g transform="translate(1188 94)">
    <rect x="0" y="0" width="114" height="36" rx="18" class="pill"/>
    <text x="57" y="23" text-anchor="middle" class="status-text">Draft</text>
  </g>

  <g transform="translate(1318 94)">
    <rect x="0" y="0" width="132" height="36" rx="18" class="site-pill"/>
    <text x="66" y="23" text-anchor="middle" class="site-link">trustsurface.org</text>
  </g>

  <line x1="110" y1="258" x2="1490" y2="258" class="rule"/>

  <!-- Left note -->
  <g transform="translate(110 350)">
    <rect x="0" y="0" width="250" height="300" rx="22" class="panel"/>
    <text x="24" y="38" class="section-label">What this shows</text>
    <text x="24" y="74" class="panel-title">Capability progression</text>
    <text x="24" y="108" class="panel-copy">This model shows how digital trust matures from accidental or fragmented practice toward deliberate, governed trust posture.</text>

    <rect x="24" y="162" width="202" height="108" rx="18" class="panel-accent"/>
    <text x="125" y="192" text-anchor="middle" class="step-title" style="font-size:18px;">Important</text>
    <text x="125" y="216" text-anchor="middle" class="step-copy">Higher maturity means</text>
    <text x="125" y="236" text-anchor="middle" class="step-copy">stronger governance, visibility</text>
    <text x="125" y="256" text-anchor="middle" class="step-copy">and ownership — not hype</text>
  </g>

  <!-- Right note -->
  <g transform="translate(1240 350)">
    <rect x="0" y="0" width="250" height="300" rx="22" class="panel"/>
    <text x="24" y="38" class="section-label">How to use it</text>
    <text x="24" y="74" class="panel-title">Assessment lens</text>
    <text x="24" y="108" class="panel-copy">Use the model to assess current state, guide roadmap discussions, and frame digital trust as an organisational capability.</text>

    <rect x="24" y="162" width="202" height="108" rx="18" class="panel-accent"/>
    <text x="125" y="192" text-anchor="middle" class="step-title" style="font-size:18px;">Used in</text>
    <text x="125" y="216" text-anchor="middle" class="step-copy">Book · Framework</text>
    <text x="125" y="236" text-anchor="middle" class="step-copy">Workshops · Advisory</text>
    <text x="125" y="256" text-anchor="middle" class="step-copy">Executive discussions</text>
  </g>

  <!-- Central maturity model -->
  <g transform="translate(395 292)">
    <rect x="0" y="0" width="810" height="450" rx="28" class="panel-accent"/>

    <text x="405" y="40" text-anchor="middle" class="section-label-accent">Maturity model</text>
    <text x="405" y="80" text-anchor="middle" class="panel-title" style="font-size:30px;">Digital Trust Maturity</text>
    <text x="405" y="112" text-anchor="middle" class="panel-copy">Progression from weak signal awareness toward deliberate, trusted and governed digital presence.</text>

    <!-- Axis -->
    <line x1="90" y1="366" x2="726" y2="366" class="line-soft"/>
    <text x="90" y="392" class="maturity-axis">Lower maturity</text>
    <text x="726" y="392" text-anchor="end" class="maturity-axis">Higher maturity</text>

    <!-- Step 1 -->
    <g transform="translate(48 282)">
      <rect x="0" y="0" width="118" height="84" rx="18" class="step-1"/>
      <text x="16" y="24" class="step-num">Level 1</text>
      <text x="16" y="48" class="step-title" style="font-size:20px;">Unaware</text>
      <text x="16" y="66" class="step-copy">Trust signals are not recognised or managed.</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(182 248)">
      <rect x="0" y="0" width="126" height="118" rx="18" class="step-2"/>
      <text x="16" y="24" class="step-num">Level 2</text>
      <text x="16" y="48" class="step-title" style="font-size:20px;">Reactive</text>
      <text x="16" y="68" class="step-copy">Issues are addressed only after failure, drift or external pressure.</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(328 208)">
      <rect x="0" y="0" width="138" height="158" rx="18" class="step-3"/>
      <text x="16" y="24" class="step-num">Level 3</text>
      <text x="16" y="48" class="step-title" style="font-size:20px;">Managed</text>
      <text x="16" y="70" class="step-copy">Some trust signals are tracked, owned and improved with intent.</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(486 154)">
      <rect x="0" y="0" width="146" height="212" rx="18" class="step-4"/>
      <text x="16" y="24" class="step-num">Level 4</text>
      <text x="16" y="48" class="step-title" style="font-size:20px;">Integrated</text>
      <text x="16" y="70" class="step-copy">Digital trust is connected to governance, operations, communications and risk.</text>
    </g>

    <!-- Step 5 -->
    <g transform="translate(652 92)">
      <rect x="0" y="0" width="118" height="274" rx="18" class="step-5"/>
      <text x="16" y="24" class="step-num" style="fill:#0b4f8a;">Level 5</text>
      <text x="16" y="48" class="step-title" style="font-size:20px;">Trust Leader</text>
      <text x="16" y="70" class="step-copy">Trust posture is deliberate, legible, governed and actively signalled.</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(110 778)">
    <line x1="0" y1="0" x2="1380" y2="0" class="footer-rule"/>
    <text x="0" y="28" class="footer-meta">Figure TSF-07 · TrustSurface Framework · v0.1</text>
    <text x="1380" y="28" text-anchor="end" class="footer-statement">Digital trust maturity reflects the strength of governance, visibility and intentional signalling across the Trust Surface.</text>
  </g>
</svg>