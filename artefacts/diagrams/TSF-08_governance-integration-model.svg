<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TSF-08 — Governance Integration Model</title>
  <desc id="desc">TrustSurface Framework governance model showing digital trust as a cross-functional responsibility spanning leadership, technology, risk, communications, procurement and service operations.</desc>

  <defs>
    <style>
      text { font-family: Poppins, Arial, sans-serif; fill: #0f172a; }

      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }
      .rule { stroke: #d9e2ec; stroke-width: 2; }
      .footer-rule { stroke: #d9e2ec; stroke-width: 1.5; }

      .pill { fill: #ffffff; stroke: #bfd4e5; stroke-width: 1.5; }
      .site-pill { fill: #f8fbfd; stroke: #d9e2ec; stroke-width: 1.5; }

      .panel { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.5; }
      .panel-soft { fill: #f8fbfd; stroke: #d9e2ec; stroke-width: 1.5; }
      .panel-accent { fill: #eef6fb; stroke: #0b4f8a; stroke-width: 2.25; }

      .node { fill: #ffffff; stroke: #bcd0df; stroke-width: 1.5; }
      .core { fill: #eef6fb; stroke: #0b4f8a; stroke-width: 2.25; }

      .connector { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
      .connector-accent { stroke: #0b4f8a; stroke-width: 1.75; fill: none; opacity: 0.7; }

      .logo-mark { color: #0b4f8a; }

      .kicker {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .figure-id {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .title-text {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .subtitle-text {
        font-size: 24px;
        font-weight: 500;
        fill: #475569;
      }

      .status-text {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .site-link {
        font-size: 15px;
        font-weight: 600;
        fill: #0b4f8a;
      }

      .section-label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .section-label-accent {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .panel-title {
        font-size: 26px;
        font-weight: 700;
      }

      .panel-copy {
        font-size: 17px;
        font-weight: 500;
        fill: #475569;
      }

      .node-title {
        font-size: 18px;
        font-weight: 700;
      }

      .node-copy {
        font-size: 14px;
        font-weight: 500;
        fill: #475569;
      }

      .core-label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .core-title {
        font-size: 30px;
        font-weight: 700;
      }

      .core-copy {
        font-size: 16px;
        font-weight: 500;
        fill: #475569;
      }

      .footer-meta {
        font-size: 14px;
        font-weight: 600;
        fill: #64748b;
      }

      .footer-statement {
        font-size: 16px;
        font-weight: 600;
      }
    </style>

    <symbol id="ts-mark" viewBox="0 0 24 24">
      <path d="M12 3l8 4v6c0 5-3.4 9-8 8-4.6 1-8-3-8-8V7l8-4z" stroke="currentColor" stroke-width="1.8"/>
      <path d="M7.5 10.5h9M7.5 13.5h9M9.5 16.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1600" height="900" class="bg"/>
  <rect x="52" y="52" width="1496" height="796" rx="28" class="frame"/>

  <!-- Header -->
  <g transform="translate(110 96)">
    <use href="#ts-mark" x="0" y="0" width="40" height="40" class="logo-mark"/>
    <text x="58" y="17" class="kicker">TRUSTSURFACE FRAMEWORK</text>
    <text x="0" y="74" class="figure-id">FIGURE TSF-08</text>
    <text x="0" y="132" class="title-text">Governance Integration Model</text>
    <text x="0" y="172" class="subtitle-text">Digital trust is organisational: it depends on coordinated ownership across functions, not one team acting alone.</text>
  </g>

  <!-- Top-right chrome -->
  <g transform="translate(1188 94)">
    <rect x="0" y="0" width="114" height="36" rx="18" class="pill"/>
    <text x="57" y="23" text-anchor="middle" class="status-text">Draft</text>
  </g>

  <g transform="translate(1318 94)">
    <rect x="0" y="0" width="132" height="36" rx="18" class="site-pill"/>
    <text x="66" y="23" text-anchor="middle" class="site-link">trustsurface.org</text>
  </g>

  <line x1="110" y1="258" x2="1490" y2="258" class="rule"/>

  <!-- Left note -->
  <g transform="translate(110 346)">
    <rect x="0" y="0" width="250" height="302" rx="22" class="panel"/>
    <text x="24" y="38" class="section-label">What this shows</text>
    <text x="24" y="74" class="panel-title">Cross-functional ownership</text>
    <text x="24" y="108" class="panel-copy">Digital trust is shaped by decisions spread across multiple teams. Governance exists to connect those decisions coherently.</text>

    <rect x="24" y="164" width="202" height="110" rx="18" class="panel-accent"/>
    <text x="125" y="194" text-anchor="middle" class="node-title" style="font-size:18px;">Key idea</text>
    <text x="125" y="218" text-anchor="middle" class="node-copy">The Trust Signal Gap</text>
    <text x="125" y="238" text-anchor="middle" class="node-copy">often persists because</text>
    <text x="125" y="258" text-anchor="middle" class="node-copy">ownership is fragmented</text>
  </g>

  <!-- Right note -->
  <g transform="translate(1240 346)">
    <rect x="0" y="0" width="250" height="302" rx="22" class="panel"/>
    <text x="24" y="38" class="section-label">How to use it</text>
    <text x="24" y="74" class="panel-title">Governance lens</text>
    <text x="24" y="108" class="panel-copy">Use this model to frame accountability, sponsorship, escalation and decision-making across the Trust Surface.</text>

    <rect x="24" y="164" width="202" height="110" rx="18" class="panel-accent"/>
    <text x="125" y="194" text-anchor="middle" class="node-title" style="font-size:18px;">Used in</text>
    <text x="125" y="218" text-anchor="middle" class="node-copy">Book · Framework</text>
    <text x="125" y="238" text-anchor="middle" class="node-copy">Executive discussion</text>
    <text x="125" y="258" text-anchor="middle" class="node-copy">Advisory and workshops</text>
  </g>

  <!-- Central model -->
  <g transform="translate(395 292)">
    <rect x="0" y="0" width="810" height="450" rx="28" class="panel-accent"/>

    <text x="405" y="40" text-anchor="middle" class="section-label-accent">Governance model</text>
    <text x="405" y="80" text-anchor="middle" class="panel-title" style="font-size:30px;">Digital Trust Governance</text>
    <text x="405" y="112" text-anchor="middle" class="panel-copy">A coordinating model across the functions that shape trust signals, trust posture and public confidence.</text>

    <!-- Centre -->
    <circle cx="405" cy="244" r="92" class="core"/>
    <text x="405" y="212" text-anchor="middle" class="core-label">Core construct</text>
    <text x="405" y="246" text-anchor="middle" class="core-title">Digital Trust</text>
    <text x="405" y="276" text-anchor="middle" class="core-title">Governance</text>
    <text x="405" y="306" text-anchor="middle" class="core-copy">Shared accountability</text>

    <!-- Connectors -->
    <line x1="405" y1="152" x2="405" y2="102" class="connector-accent"/>
    <line x1="486" y1="190" x2="592" y2="144" class="connector"/>
    <line x1="500" y1="264" x2="620" y2="264" class="connector"/>
    <line x1="486" y1="298" x2="592" y2="344" class="connector"/>
    <line x1="405" y1="336" x2="405" y2="392" class="connector-accent"/>
    <line x1="324" y1="298" x2="218" y2="344" class="connector"/>
    <line x1="310" y1="224" x2="190" y2="224" class="connector"/>
    <line x1="324" y1="190" x2="218" y2="144" class="connector"/>

    <!-- Top -->
    <g transform="translate(302 18)">
      <rect x="0" y="0" width="206" height="72" rx="18" class="node"/>
      <text x="103" y="28" text-anchor="middle" class="node-title">Leadership</text>
      <text x="103" y="48" text-anchor="middle" class="node-copy">Sponsorship and direction</text>
    </g>

    <!-- Top right -->
    <g transform="translate(592 104)">
      <rect x="0" y="0" width="184" height="72" rx="18" class="node"/>
      <text x="92" y="28" text-anchor="middle" class="node-title">Technology</text>
      <text x="92" y="48" text-anchor="middle" class="node-copy">Platforms and implementation</text>
    </g>

    <!-- Right -->
    <g transform="translate(620 228)">
      <rect x="0" y="0" width="162" height="72" rx="18" class="node"/>
      <text x="81" y="28" text-anchor="middle" class="node-title">Risk</text>
      <text x="81" y="48" text-anchor="middle" class="node-copy">Controls and oversight</text>
    </g>

    <!-- Bottom right -->
    <g transform="translate(592 334)">
      <rect x="0" y="0" width="184" height="72" rx="18" class="node"/>
      <text x="92" y="28" text-anchor="middle" class="node-title">Communications</text>
      <text x="92" y="48" text-anchor="middle" class="node-copy">Messaging and public trust</text>
    </g>

    <!-- Bottom -->
    <g transform="translate(292 394)">
      <rect x="0" y="0" width="226" height="72" rx="18" class="node"/>
      <text x="113" y="28" text-anchor="middle" class="node-title">Procurement &amp; Vendors</text>
      <text x="113" y="48" text-anchor="middle" class="node-copy">Dependencies and third-party assurance</text>
    </g>

    <!-- Bottom left -->
    <g transform="translate(34 334)">
      <rect x="0" y="0" width="184" height="72" rx="18" class="node"/>
      <text x="92" y="28" text-anchor="middle" class="node-title">Service Operations</text>
      <text x="92" y="48" text-anchor="middle" class="node-copy">Delivery and continuity</text>
    </g>

    <!-- Left -->
    <g transform="translate(28 188)">
      <rect x="0" y="0" width="162" height="72" rx="18" class="node"/>
      <text x="81" y="28" text-anchor="middle" class="node-title">Legal</text>
      <text x="81" y="48" text-anchor="middle" class="node-copy">Obligations and posture</text>
    </g>

    <!-- Top left -->
    <g transform="translate(34 104)">
      <rect x="0" y="0" width="184" height="72" rx="18" class="node"/>
      <text x="92" y="28" text-anchor="middle" class="node-title">Identity &amp; Access</text>
      <text x="92" y="48" text-anchor="middle" class="node-copy">Authority and control</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(110 778)">
    <line x1="0" y1="0" x2="1380" y2="0" class="footer-rule"/>
    <text x="0" y="28" class="footer-meta">Figure TSF-08 · TrustSurface Framework · v0.1</text>
    <text x="1380" y="28" text-anchor="end" class="footer-statement">Digital trust is governed across functions, because trust signals are shaped by decisions made across the organisation.</text>
  </g>
</svg>