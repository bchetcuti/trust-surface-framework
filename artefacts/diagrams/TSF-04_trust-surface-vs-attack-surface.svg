<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TSF-04 — Trust Surface vs Attack Surface</title>
  <desc id="desc">TrustSurface Framework comparison diagram distinguishing the Trust Surface from the Attack Surface while showing their shared relationship to the same digital environment.</desc>

  <defs>
    <style>
      text { font-family: Poppins, Arial, sans-serif; fill: #0f172a; }

      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }
      .rule { stroke: #d9e2ec; stroke-width: 2; }
      .footer-rule { stroke: #d9e2ec; stroke-width: 1.5; }

      .pill { fill: #ffffff; stroke: #bfd4e5; stroke-width: 1.5; }
      .site-pill { fill: #f8fbfd; stroke: #d9e2ec; stroke-width: 1.5; }

      .panel { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }
      .panel-soft { fill: #f8fbfd; stroke: #d9e2ec; stroke-width: 1.5; }
      .panel-accent { fill: #eef6fb; stroke: #0b4f8a; stroke-width: 2.25; }
      .band { fill: #ffffff; stroke: #bcd0df; stroke-width: 1.5; }

      .logo-mark { color: #0b4f8a; }
      .bullet { fill: #0b4f8a; }
      .bullet-soft { fill: #64748b; }

      .kicker {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .figure-id {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .title-text {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .subtitle-text {
        font-size: 24px;
        font-weight: 500;
        fill: #475569;
      }

      .status-text {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .site-link {
        font-size: 15px;
        font-weight: 600;
        fill: #0b4f8a;
      }

      .section-label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .section-label-accent {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .panel-title {
        font-size: 30px;
        font-weight: 700;
      }

      .panel-copy {
        font-size: 17px;
        font-weight: 500;
        fill: #475569;
      }

      .metric-title {
        font-size: 18px;
        font-weight: 650;
      }

      .metric-copy {
        font-size: 14px;
        font-weight: 500;
        fill: #475569;
      }

      .band-title {
        font-size: 18px;
        font-weight: 700;
        fill: #0b4f8a;
      }

      .band-copy {
        font-size: 15px;
        font-weight: 500;
        fill: #334155;
      }

      .footer-meta {
        font-size: 14px;
        font-weight: 600;
        fill: #64748b;
      }

      .footer-statement {
        font-size: 16px;
        font-weight: 600;
      }
    </style>

    <symbol id="ts-mark" viewBox="0 0 24 24">
      <path d="M12 3l8 4v6c0 5-3.4 9-8 8-4.6 1-8-3-8-8V7l8-4z" stroke="currentColor" stroke-width="1.8"/>
      <path d="M7.5 10.5h9M7.5 13.5h9M9.5 16.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1600" height="900" class="bg"/>
  <rect x="52" y="52" width="1496" height="796" rx="28" class="frame"/>

  <!-- Header -->
  <g transform="translate(110 96)">
    <use href="#ts-mark" x="0" y="0" width="40" height="40" class="logo-mark"/>
    <text x="58" y="17" class="kicker">TRUSTSURFACE FRAMEWORK</text>
    <text x="0" y="74" class="figure-id">FIGURE TSF-04</text>
    <text x="0" y="132" class="title-text">Trust Surface vs Attack Surface</text>
    <text x="0" y="172" class="subtitle-text">Two different lenses over the same environment: one focused on exploitability, the other on observable trust.</text>
  </g>

  <!-- Top-right chrome -->
  <g transform="translate(1188 94)">
    <rect x="0" y="0" width="114" height="36" rx="18" class="pill"/>
    <text x="57" y="23" text-anchor="middle" class="status-text">Draft</text>
  </g>

  <g transform="translate(1318 94)">
    <rect x="0" y="0" width="132" height="36" rx="18" class="site-pill"/>
    <text x="66" y="23" text-anchor="middle" class="site-link">trustsurface.org</text>
  </g>

  <line x1="110" y1="258" x2="1490" y2="258" class="rule"/>

  <!-- Left panel -->
  <g transform="translate(110 310)">
    <rect x="0" y="0" width="600" height="384" rx="24" class="panel"/>
    <text x="36" y="44" class="section-label">Conventional security lens</text>
    <text x="36" y="86" class="panel-title">Attack Surface</text>
    <text x="36" y="116" class="panel-copy">The set of systems, services, identities and exposures that may be targeted, exploited or abused.</text>

    <g transform="translate(36 152)">
      <rect x="0" y="0" width="528" height="56" rx="16" class="panel-soft"/>
      <circle cx="20" cy="28" r="4" class="bullet-soft"/>
      <text x="38" y="25" class="metric-title">Primary concern</text>
      <text x="38" y="45" class="metric-copy">Exploitability, exposure, attack paths, weakness and abuse potential</text>

      <rect x="0" y="72" width="528" height="56" rx="16" class="panel-soft"/>
      <circle cx="20" cy="100" r="4" class="bullet-soft"/>
      <text x="38" y="97" class="metric-title">Typical questions</text>
      <text x="38" y="117" class="metric-copy">What can be reached, misused, compromised or escalated?</text>

      <rect x="0" y="144" width="528" height="56" rx="16" class="panel-soft"/>
      <circle cx="20" cy="172" r="4" class="bullet-soft"/>
      <text x="38" y="169" class="metric-title">Typical measures</text>
      <text x="38" y="189" class="metric-copy">Ports, services, software exposure, identity pathways, vulnerabilities</text>

      <rect x="0" y="216" width="528" height="56" rx="16" class="panel-soft"/>
      <circle cx="20" cy="244" r="4" class="bullet-soft"/>
      <text x="38" y="241" class="metric-title">Primary audience</text>
      <text x="38" y="261" class="metric-copy">Security, infrastructure, architecture, detection and response teams</text>
    </g>
  </g>

  <!-- Right panel -->
  <g transform="translate(780 310)">
    <rect x="0" y="0" width="710" height="384" rx="24" class="panel-accent"/>
    <text x="36" y="44" class="section-label-accent">TrustSurface lens</text>
    <text x="36" y="86" class="panel-title">Trust Surface</text>
    <text x="36" y="116" class="panel-copy">The set of observable signals through which customers, partners, regulators, donors and the public judge whether an organisation appears authentic, reliable and well governed.</text>

    <g transform="translate(36 152)">
      <rect x="0" y="0" width="638" height="56" rx="16" class="panel"/>
      <circle cx="20" cy="28" r="4" class="bullet"/>
      <text x="38" y="25" class="metric-title">Primary concern</text>
      <text x="38" y="45" class="metric-copy">Legibility, credibility, reliability, authenticity and trust posture</text>

      <rect x="0" y="72" width="638" height="56" rx="16" class="panel"/>
      <circle cx="20" cy="100" r="4" class="bullet"/>
      <text x="38" y="97" class="metric-title">Typical questions</text>
      <text x="38" y="117" class="metric-copy">What can others see, verify, interpret or mistrust about the organisation?</text>

      <rect x="0" y="144" width="638" height="56" rx="16" class="panel"/>
      <circle cx="20" cy="172" r="4" class="bullet"/>
      <text x="38" y="169" class="metric-title">Typical measures</text>
      <text x="38" y="189" class="metric-copy">Email authenticity, domain integrity, service trust, resilience cues, third-party confidence</text>

      <rect x="0" y="216" width="638" height="56" rx="16" class="panel"/>
      <circle cx="20" cy="244" r="4" class="bullet"/>
      <text x="38" y="241" class="metric-title">Primary audience</text>
      <text x="38" y="261" class="metric-copy">Executives, governance, communications, technology, stakeholders and the public</text>
    </g>
  </g>

  <!-- Shared band -->
  <g transform="translate(110 722)">
    <rect x="0" y="0" width="1380" height="76" rx="18" class="band"/>
    <text x="690" y="28" text-anchor="middle" class="band-title">Shared environment, different lens</text>
    <text x="690" y="52" text-anchor="middle" class="band-copy">Both concepts examine the same digital environment. The Attack Surface asks what can be exploited. The Trust Surface asks what others can observe, infer and rely on.</text>
  </g>

  <!-- Footer -->
  <g transform="translate(110 820)">
    <line x1="0" y1="0" x2="1380" y2="0" class="footer-rule"/>
    <text x="0" y="28" class="footer-meta">Figure TSF-04 · TrustSurface Framework · v0.1</text>
    <text x="1380" y="28" text-anchor="end" class="footer-statement">The Trust Surface complements security analysis by focusing on observable trust rather than exploitability alone.</text>
  </g>
</svg>