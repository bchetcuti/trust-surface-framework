<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TSF-05 — Trust Surface Lifecycle</title>
  <desc id="desc">TrustSurface Framework operating model showing the lifecycle of Discover, Assess, Harden, Govern, and Signal as a repeatable digital trust discipline.</desc>

  <defs>
    <style>
      text { font-family: Poppins, Arial, sans-serif; fill: #0f172a; }

      .bg { fill: #f8fafc; }
      .frame { fill: #ffffff; stroke: #d9e2ec; stroke-width: 2; }
      .rule { stroke: #d9e2ec; stroke-width: 2; }
      .footer-rule { stroke: #d9e2ec; stroke-width: 1.5; }

      .pill { fill: #ffffff; stroke: #bfd4e5; stroke-width: 1.5; }
      .site-pill { fill: #f8fbfd; stroke: #d9e2ec; stroke-width: 1.5; }

      .panel { fill: #ffffff; stroke: #d9e2ec; stroke-width: 1.5; }
      .panel-accent { fill: #eef6fb; stroke: #0b4f8a; stroke-width: 2; }

      .loop-node { fill: #ffffff; stroke: #0b4f8a; stroke-width: 2; }
      .loop-node-soft { fill: #f8fbfd; stroke: #bcd0df; stroke-width: 1.5; }
      .loop-line { stroke: #0b4f8a; stroke-width: 2; fill: none; opacity: 0.75; }
      .loop-line-soft { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }

      .logo-mark { color: #0b4f8a; }

      .kicker {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .figure-id {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .title-text {
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .subtitle-text {
        font-size: 24px;
        font-weight: 500;
        fill: #475569;
      }

      .status-text {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .site-link {
        font-size: 15px;
        font-weight: 600;
        fill: #0b4f8a;
      }

      .section-label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #64748b;
      }

      .section-label-accent {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .panel-title {
        font-size: 26px;
        font-weight: 650;
      }

      .panel-copy {
        font-size: 17px;
        font-weight: 500;
        fill: #475569;
      }

      .node-title {
        font-size: 20px;
        font-weight: 700;
      }

      .node-copy {
        font-size: 14px;
        font-weight: 500;
        fill: #475569;
      }

      .core-label {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        fill: #0b4f8a;
      }

      .core-title {
        font-size: 30px;
        font-weight: 700;
      }

      .core-copy {
        font-size: 16px;
        font-weight: 500;
        fill: #475569;
      }

      .output-title {
        font-size: 16px;
        font-weight: 650;
      }

      .output-copy {
        font-size: 13px;
        font-weight: 500;
        fill: #475569;
      }

      .footer-meta {
        font-size: 14px;
        font-weight: 600;
        fill: #64748b;
      }

      .footer-statement {
        font-size: 16px;
        font-weight: 600;
      }
    </style>

    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0b4f8a"/>
    </marker>

    <symbol id="ts-mark" viewBox="0 0 24 24">
      <path d="M12 3l8 4v6c0 5-3.4 9-8 8-4.6 1-8-3-8-8V7l8-4z" stroke="currentColor" stroke-width="1.8"/>
      <path d="M7.5 10.5h9M7.5 13.5h9M9.5 16.5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1600" height="900" class="bg"/>
  <rect x="52" y="52" width="1496" height="796" rx="28" class="frame"/>

  <!-- Header -->
  <g transform="translate(110 96)">
    <use href="#ts-mark" x="0" y="0" width="40" height="40" class="logo-mark"/>
    <text x="58" y="17" class="kicker">TRUSTSURFACE FRAMEWORK</text>
    <text x="0" y="74" class="figure-id">FIGURE TSF-05</text>
    <text x="0" y="132" class="title-text">Trust Surface Lifecycle</text>
    <text x="0" y="172" class="subtitle-text">A repeatable discipline for understanding, improving and signalling digital trust over time.</text>
  </g>

  <!-- Top-right chrome -->
  <g transform="translate(1188 94)">
    <rect x="0" y="0" width="114" height="36" rx="18" class="pill"/>
    <text x="57" y="23" text-anchor="middle" class="status-text">Draft</text>
  </g>

  <g transform="translate(1318 94)">
    <rect x="0" y="0" width="132" height="36" rx="18" class="site-pill"/>
    <text x="66" y="23" text-anchor="middle" class="site-link">trustsurface.org</text>
  </g>

  <line x1="110" y1="258" x2="1490" y2="258" class="rule"/>

  <!-- Left note -->
  <g transform="translate(110 350)">
    <rect x="0" y="0" width="250" height="286" rx="22" class="panel"/>
    <text x="24" y="38" class="section-label">What this shows</text>
    <text x="24" y="74" class="panel-title">Operating model</text>
    <text x="24" y="108" class="panel-copy">The lifecycle expresses how the TrustSurface Framework is applied as an ongoing governance rhythm rather than a one-off review.</text>

    <rect x="24" y="156" width="202" height="96" rx="18" class="panel-accent"/>
    <text x="125" y="188" text-anchor="middle" class="output-title">Repeatable discipline</text>
    <text x="125" y="210" text-anchor="middle" class="output-copy">Observe, assess, improve,</text>
    <text x="125" y="228" text-anchor="middle" class="output-copy">govern and communicate trust</text>
  </g>

  <!-- Right note -->
  <g transform="translate(1240 350)">
    <rect x="0" y="0" width="250" height="286" rx="22" class="panel"/>
    <text x="24" y="38" class="section-label">How to read it</text>
    <text x="24" y="74" class="panel-title">Not linear-only</text>
    <text x="24" y="108" class="panel-copy">The stages can begin from different entry points, but the framework is strongest when used as a continuous loop.</text>

    <rect x="24" y="156" width="202" height="96" rx="18" class="panel-accent"/>
    <text x="125" y="188" text-anchor="middle" class="output-title">Used in the framework</text>
    <text x="125" y="210" text-anchor="middle" class="output-copy">Book · Framework · Advisory</text>
    <text x="125" y="228" text-anchor="middle" class="output-copy">Operating model and method</text>
  </g>

  <!-- Central lifecycle area -->
  <g transform="translate(395 292)">
    <rect x="0" y="0" width="810" height="450" rx="28" class="panel-accent"/>

    <text x="405" y="40" text-anchor="middle" class="section-label-accent">Operating model</text>
    <text x="405" y="80" text-anchor="middle" class="panel-title" style="font-size:30px;">The Trust Surface Lifecycle</text>
    <text x="405" y="112" text-anchor="middle" class="panel-copy">A governance rhythm for discovering, improving and signalling trust across the Trust Surface.</text>

    <!-- Loop arrows -->
    <path d="M405 136 C530 136 620 180 650 260" class="loop-line" marker-end="url(#arrowhead)"/>
    <path d="M675 270 C690 335 650 385 585 412" class="loop-line" marker-end="url(#arrowhead)"/>
    <path d="M540 420 C455 446 355 446 270 420" class="loop-line" marker-end="url(#arrowhead)"/>
    <path d="M225 412 C160 385 120 335 135 270" class="loop-line" marker-end="url(#arrowhead)"/>
    <path d="M160 260 C190 180 280 136 405 136" class="loop-line" marker-end="url(#arrowhead)"/>

    <!-- Centre -->
    <circle cx="405" cy="274" r="82" class="panel"/>
    <text x="405" y="242" text-anchor="middle" class="core-label">Core discipline</text>
    <text x="405" y="276" text-anchor="middle" class="core-title">Digital Trust</text>
    <text x="405" y="306" text-anchor="middle" class="core-title">Governance</text>
    <text x="405" y="334" text-anchor="middle" class="core-copy">Applied continuously</text>

    <!-- Nodes -->
    <g transform="translate(315 126)">
      <rect x="0" y="0" width="180" height="72" rx="18" class="loop-node"/>
      <text x="90" y="30" text-anchor="middle" class="node-title">Discover</text>
      <text x="90" y="50" text-anchor="middle" class="node-copy">Observe the Trust Surface</text>
    </g>

    <g transform="translate(540 220)">
      <rect x="0" y="0" width="180" height="72" rx="18" class="loop-node-soft"/>
      <text x="90" y="30" text-anchor="middle" class="node-title">Assess</text>
      <text x="90" y="50" text-anchor="middle" class="node-copy">Evaluate trust signals</text>
    </g>

    <g transform="translate(450 360)">
      <rect x="0" y="0" width="180" height="72" rx="18" class="loop-node-soft"/>
      <text x="90" y="30" text-anchor="middle" class="node-title">Harden</text>
      <text x="90" y="50" text-anchor="middle" class="node-copy">Strengthen weak signals</text>
    </g>

    <g transform="translate(180 360)">
      <rect x="0" y="0" width="180" height="72" rx="18" class="loop-node-soft"/>
      <text x="90" y="30" text-anchor="middle" class="node-title">Govern</text>
      <text x="90" y="50" text-anchor="middle" class="node-copy">Assign ownership and control</text>
    </g>

    <g transform="translate(90 220)">
      <rect x="0" y="0" width="180" height="72" rx="18" class="loop-node-soft"/>
      <text x="90" y="30" text-anchor="middle" class="node-title">Signal</text>
      <text x="90" y="50" text-anchor="middle" class="node-copy">Make trust observable</text>
    </g>

    <!-- Outputs -->
    <g transform="translate(42 118)">
      <rect x="0" y="0" width="150" height="56" rx="16" class="panel"/>
      <text x="75" y="24" text-anchor="middle" class="output-title">Inventory</text>
      <text x="75" y="42" text-anchor="middle" class="output-copy">Trust Surface view</text>
    </g>
    <line x1="192" y1="146" x2="315" y2="162" class="loop-line-soft"/>

    <g transform="translate(656 126)">
      <rect x="0" y="0" width="112" height="56" rx="16" class="panel"/>
      <text x="56" y="24" text-anchor="middle" class="output-title">Scorecard</text>
      <text x="56" y="42" text-anchor="middle" class="output-copy">Assessment view</text>
    </g>
    <line x1="656" y1="154" x2="630" y2="220" class="loop-line-soft"/>

    <g transform="translate(660 356)">
      <rect x="0" y="0" width="120" height="56" rx="16" class="panel"/>
      <text x="60" y="24" text-anchor="middle" class="output-title">Hardening</text>
      <text x="60" y="42" text-anchor="middle" class="output-copy">Improvement plan</text>
    </g>
    <line x1="660" y1="384" x2="630" y2="396" class="loop-line-soft"/>

    <g transform="translate(24 356)">
      <rect x="0" y="0" width="132" height="56" rx="16" class="panel"/>
      <text x="66" y="24" text-anchor="middle" class="output-title">Governance</text>
      <text x="66" y="42" text-anchor="middle" class="output-copy">Ownership model</text>
    </g>
    <line x1="156" y1="384" x2="180" y2="396" class="loop-line-soft"/>

    <g transform="translate(22 220)">
      <rect x="0" y="0" width="132" height="56" rx="16" class="panel"/>
      <text x="66" y="24" text-anchor="middle" class="output-title">Transparency</text>
      <text x="66" y="42" text-anchor="middle" class="output-copy">Visible signals</text>
    </g>
    <line x1="154" y1="248" x2="180" y2="248" class="loop-line-soft"/>
  </g>

  <!-- Footer -->
  <g transform="translate(110 778)">
    <line x1="0" y1="0" x2="1380" y2="0" class="footer-rule"/>
    <text x="0" y="28" class="footer-meta">Figure TSF-05 · TrustSurface Framework · v0.1</text>
    <text x="1380" y="28" text-anchor="end" class="footer-statement">The Trust Surface Lifecycle turns digital trust from a passive condition into a governed, repeatable discipline.</text>
  </g>
</svg>